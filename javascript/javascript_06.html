<!DOCTYPE html>
<html>
      <head>
             <title>.: javascript 06 :.</title>
           <style type="text/css">
              .image-container {
                  display: none;
              }
             </style>
              <script>
                function setVisibility(id, value){
                   document.getElementById(id).style.display = value;
                }
            </script>
     </head>
    <body>
       <div class="image-container" id="txt-logo">
          <img src="txt-logo.jpg" width="30%" />
       </div>
       [ <a href="javascript:void(0)" onclick="return setVisibility('txt-logo', 'block')">Display Image</a> |
          <a href="javascript:void(0)" onclick="return setVisibility('txt-logo', 'none')">Hide Image</a>
         ]
         <div class="image-container" id="cortis-logo">
           <img src="cortis-logo.jpg" width="30%" />
         </div>
         [ <a href="javascript:void(0)" onclick="return setVisibility('cortis-logo', 'block')">Display Image</a> |
          <a href="javascript:void(0)" onclick="return setVisibility('cortis-logo', 'none')">Hide Image</a>
         ]
    </body>
</html>
