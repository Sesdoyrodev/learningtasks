<!DOCTYPE html>
<html>
<head>
    <title>My Top 10 Favorite Celebrities</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
        }

        h1 {
            margin: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            padding: 20px;
        }

        input[type="checkbox"] {
            display: none;
        }

        .card {
            background: white;
            padding: 10px;
            border-radius: 10px;
            transition: 0.3s;
            cursor: pointer;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        .description {
            display: none;
            margin-top: 10px;
            font-size: 14px;
        }
        input:checked + .card .description {
            display: block;
        }

    </style>
</head>

<body style="background: linear-gradient(to right, #667eea, #764ba2);">

<div class="container">
